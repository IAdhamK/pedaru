name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Fast checks: run on every PR update (quick feedback loop)
  # ---------------------------------------------------------------------------
  rust-fast:
    name: Rust Fast Checks
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt -- --check

  frontend-fast:
    name: Frontend Fast Checks
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting (Biome + Prettier)
        run: npm run format:check

      - name: Run Biome linter
        run: npm run lint

      - name: Check TypeScript types
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Full checks: run only on opened/reopened/ready_for_review
  # ---------------------------------------------------------------------------
  rust-full:
    name: Rust Full Tests
    if: github.event.pull_request.draft == false && contains(fromJson('["opened","reopened","ready_for_review"]'), github.event.action)
    needs: [rust-fast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --verbose

  frontend-full:
    name: Frontend Full Tests
    if: github.event.pull_request.draft == false && contains(fromJson('["opened","reopened","ready_for_review"]'), github.event.action)
    needs: [frontend-fast]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test

      - name: Build frontend
        run: npm run build
